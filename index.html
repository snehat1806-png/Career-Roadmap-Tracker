<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Roadmap Tracker</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header class="header">

        <div class="logo">
            🚀 Career Roadmap Tracker
        </div>

        <button id="themeToggle" aria-label="Toggle Dark Mode">
            🌌
        </button>

    </header>

    <!-- Hero Section -->
    <section class="hero">

        <h1>Plan Your Learning Journey</h1>

        <p>
            Organize your goals, track your progress,
            and achieve your dream career.
        </p>

    </section>

    <!-- Dashboard -->
    <section class="dashboard">

        <div class="card">
            <h3>Total Goals</h3>
            <span id="totalGoals">0</span>
        </div>

        <div class="card">
            <h3>Completed</h3>
            <span id="completedGoals">0</span>
        </div>

        <div class="card">
            <h3>Pending</h3>
            <span id="pendingGoals">0</span>
        </div>

        <div class="card">
            <h3>Overall Progress</h3>
            <span id="overallProgress">0%</span>
        </div>
    </section>

    <!-- Controls -->
    <section class="controls">

        <input type="text" id="search" placeholder="🔍 Search Goal">

        <button id="addGoalBtn">
            + Add Goal
        </button>

    </section>

    <section class="goal-section">

        <h2>Your Goals</h2>

        <div id="goalContainer"></div>

    </section>
